name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  build-linux:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: k3dev-linux-x86_64
          - target: x86_64-unknown-linux-musl
            artifact: k3dev-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            artifact: k3dev-linux-aarch64
          - target: aarch64-unknown-linux-musl
            artifact: k3dev-linux-aarch64-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          targets: ${{ matrix.target }},x86_64-unknown-linux-musl

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == aarch64* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu musl-dev
          fi

      - name: Install cross
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            agent/target
            assets
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Set up QEMU
        if: contains(matrix.target, 'aarch64')
        uses: docker/setup-qemu-action@v3

      - name: Prepare embedded assets
        run: |
          mkdir -p assets
          SOCAT_VERSION="1.8.0.3"

          # Build k3dev-agent for x86_64 natively (build.rs handles this too,
          # but pre-building avoids redundant work during cross compilation)
          ./scripts/build-agent.sh

          # For aarch64 targets, also cross-build the aarch64 agent
          if [[ "${{ matrix.target }}" == aarch64* ]]; then
            cross build --release --target aarch64-unknown-linux-musl --manifest-path agent/Cargo.toml
            cp agent/target/aarch64-unknown-linux-musl/release/k3dev-agent assets/k3dev-agent-aarch64
          fi

          # Build socat for the target architecture via Docker.
          # Determine which arch this target needs.
          case "${{ matrix.target }}" in
            aarch64*) SOCAT_ARCH="aarch64"; PLATFORM="linux/arm64" ;;
            *)        SOCAT_ARCH="x86_64";  PLATFORM="linux/amd64" ;;
          esac

          if [[ ! -f "assets/socat-${SOCAT_ARCH}" ]] || ! file "assets/socat-${SOCAT_ARCH}" | grep -q ELF; then
            echo "Building socat ${SOCAT_VERSION} for ${SOCAT_ARCH} via Docker..."
            docker run --rm --platform "${PLATFORM}" \
              -v "$PWD/assets:/out" \
              alpine:3.21 sh -c "
                apk add -q build-base linux-headers && \
                wget -q http://www.dest-unreach.org/socat/download/socat-${SOCAT_VERSION}.tar.gz \
                  -O /tmp/socat.tar.gz && \
                cd /tmp && tar xzf socat.tar.gz && cd socat-${SOCAT_VERSION} && \
                CFLAGS='-static -Os' LDFLAGS='-static -s' ./configure \
                  --disable-openssl --disable-readline --disable-libwrap --disable-fips \
                  >/dev/null 2>&1 && \
                make -j\$(nproc) >/dev/null 2>&1 && \
                strip socat && \
                cp socat /out/socat-${SOCAT_ARCH}"
            echo "Built socat-${SOCAT_ARCH}"
          else
            echo "socat-${SOCAT_ARCH} already exists and is valid ELF"
          fi

          # Create placeholders for the non-target arch so include_bytes! compiles.
          for arch in x86_64 aarch64; do
            for bin in socat k3dev-agent; do
              [[ -f "assets/${bin}-${arch}" ]] || echo -n "placeholder" > "assets/${bin}-${arch}"
            done
          done

      - name: Verify embedded assets
        run: |
          case "${{ matrix.target }}" in
            aarch64*) TARGET_ARCH="aarch64" ;;
            *)        TARGET_ARCH="x86_64" ;;
          esac
          for bin in socat k3dev-agent; do
            asset="assets/${bin}-${TARGET_ARCH}"
            if ! file "$asset" | grep -q ELF; then
              echo "::error::${asset} is not a valid ELF binary — build would ship a broken placeholder"
              file "$asset"
              exit 1
            fi
            echo "OK: $(file "$asset")"
          done

      - name: Build (native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v2"

      - name: Build (cross)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Install UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Compress with UPX
        run: |
          # UPX doesn't work well with cross-compiled ARM binaries, skip for aarch64
          if [[ "${{ matrix.target }}" != aarch64* ]]; then
            upx --best --lzma target/${{ matrix.target }}/release/k3dev || true
          fi

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/k3dev dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: k3dev-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: k3dev-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            agent/target
            assets
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/k3dev dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            artifact=$(basename "$dir")
            cp "$dir$artifact" "release/$artifact"
            chmod +x "release/$artifact"
            # Create sha256 checksum
            cd release && sha256sum "$artifact" > "$artifact.sha256" && cd ..
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
